<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Det 320 | Attendance Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --af-blue: #003087; --af-silver: #a7a9ac; --danger: #dc3545; --success: #28a745; --warning: #f59e0b; --bg: #f8fafc; --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1e293b; }
        .hero { background: linear-gradient(135deg, var(--af-blue) 0%, #001d51 100%); color: white; padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--af-silver); margin-bottom: -50px; }
        .hero h1 { margin: 0; font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }
        .hero p { opacity: 0.9; font-size: 1.1rem; margin-top: 10px; max-width: 600px; margin: 10px auto 0; }
        .container { max-width: 850px; margin: auto; padding: 0 20px 50px 20px; }
        .search-box { background: white; padding: 40px; border-radius: 16px; box-shadow: var(--card-shadow); text-align: center; position: relative; z-index: 10; }
        .input-group { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        input[type="text"], textarea { padding: 15px 20px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; outline: none; }
        button.primary-btn { padding: 15px 30px; background: var(--af-blue); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: all 0.2s; }
        button.primary-btn:hover { background: #002366; transform: translateY(-1px); }
        .report-btn { background: #fff; border: 1px solid #cbd5e1; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; color: #64748b; }
        .dashboard-header { background: white; padding: 30px; border-radius: 16px; margin-top: 30px; border-left: 8px solid var(--af-blue); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 25px; }
        .card { background: white; padding: 25px; border-radius: 16px; border-top: 6px solid var(--af-blue); text-align: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat { font-size: 3rem; font-weight: 800; color: #0f172a; margin: 10px 0; }
        .week-section { margin-top: 20px; background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .week-header { background: #f1f5f9; padding: 15px 20px; font-weight: 700; color: #475569; display: flex; justify-content: space-between; }
        .record-row { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .cat-tag { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; background: #e2e8f0; padding: 4px 8px; border-radius: 6px; color: #475569; margin-left: 10px; }
        #correction-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal { background: white; padding: 30px; border-radius: 16px; max-width: 400px; width: 90%; }
        .status-icon { font-size: 1.4rem; min-width: 25px; display: inline-block; text-align: center; }
    </style>
</head>
<body>
<div class="hero"><h1>Attendance Portal</h1><p>Detachment 320 Readiness & Accountability</p></div>
<div class="container">
    <div class="search-box">
        <div class="input-group">
            <input type="text" id="sid" placeholder="Enter Student ID">
            <button class="primary-btn" onclick="loadDashboard()">Generate Report</button>
        </div>
    </div>
    <div id="dashboard" style="display:none;">
        <div class="dashboard-header"><h1 id="dispName" style="margin:0;"></h1><p id="dispInfo" style="margin:5px 0 0 0; color:#64748b; font-weight:600;"></p></div>
        <div class="grid" id="dispGrid"></div>
        <h3 style="margin-top:40px; color:#334155; font-weight:800;">Requirement Tracker</h3>
        <div id="historyGroups"></div>
    </div>
</div>
<div id="correction-overlay"><div class="modal">
    <h3 style="margin-top:0">Report Issue</h3><p id="modal-date" style="font-weight:600; color:var(--af-blue);"></p>
    <textarea id="reason" rows="4" style="width:100%; box-sizing:border-box;" placeholder="Explain why you were present or excused..."></textarea>
    <div style="display:flex; gap:10px; margin-top:15px;"><button class="primary-btn" style="flex:1" onclick="sendCorrection()">Submit</button><button class="primary-btn" style="flex:1; background:#64748b;" onclick="closeModal()">Cancel</button></div>
</div></div>
<script>
    let activeCadet = {}; let activeDate = "";
    async function loadDashboard() {
        const id = document.getElementById('sid').value; if (!id) return;
        document.getElementById('dashboard').style.display = 'none';
        try {
            const ts = new Date().getTime();
            const response = await fetch(`https://attendance-afrotcdet320.pythonanywhere.com/api/student/my_attendance?student_id=${id}&t=${ts}`);
            const data = await response.json(); if (data.error) { alert(data.error); return; }
            activeCadet = { name: data.name, id: id };
            document.getElementById('dispName').innerText = data.name;
            let yr = data.as_year || 'X';
            document.getElementById('dispInfo').innerText = `${yr.toString().includes('AS') ? yr : 'AS'+yr+'00'} | ${data.flight || 'Unassigned'} Flight`;
            let gHtml = '';
            for (const [cat, s] of Object.entries(data.analytics)) {
                const col = s.percentage < 80 ? 'var(--danger)' : 'var(--af-blue)';
                gHtml += `<div class="card" style="border-top-color:${col}"><div style="color:#64748b; font-size:0.85rem; font-weight:700; text-transform:uppercase;">${cat}</div><div class="stat">${s.percentage}%</div><div style="font-size:0.85rem; color:#94a3b8; font-weight:600;">Overall Attendance</div></div>`;
            }
            document.getElementById('dispGrid').innerHTML = gHtml;
            let hHtml = ''; const sortedWeeks = Object.keys(data.grouped_history).sort((a,b) => new Date(b) - new Date(a));
            sortedWeeks.forEach(week => {
                hHtml += `<div class="week-section"><div class="week-header"><span>Week of ${week}</span></div>`;
                data.grouped_history[week].forEach(r => {
                    let icon = "✅", rowStyle = "", showReport = false;
                    if (r.status === "MISSED") { icon = "❌"; rowStyle = "background-color:#fff5f5;"; showReport = true; }
                    else if (r.status === "OPTIONAL_MISSED") { icon = "⚠️"; rowStyle = "background-color:#fffbeb;"; showReport = true; }
                    else if (r.status === "OPTIONAL_OK") { icon = '<span style="color:var(--af-silver); opacity:0.5;">⬜</span>'; rowStyle = "opacity:0.8;"; }
                    hHtml += `<div class="record-row" style="${rowStyle}"><div style="display:flex; align-items:center; gap:12px;"><span class="status-icon">${icon}</span><div><span style="font-weight:700">${r.date_str}</span><span class="cat-tag">${r.category}</span></div></div><div style="text-align:right"><div style="font-weight:600; font-size:0.9rem;">${r.class_name} ${showReport ? `<button class="report-btn" onclick="openModal('${r.date_str}')">Report</button>` : ""}</div><div style="font-size:0.75rem; color:#64748b; font-weight:600">${r.type}</div></div></div>`;
                });
                hHtml += `</div>`;
            });
            document.getElementById('historyGroups').innerHTML = hHtml;
            document.getElementById('dashboard').style.display = 'block';
            window.scrollTo({ top: 300, behavior: 'smooth' });
        } catch (e) { alert("Error connecting to server."); }
    }
    function openModal(date) { activeDate = date; document.getElementById('modal-date').innerText = "Session: " + date; document.getElementById('correction-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('correction-overlay').style.display = 'none'; }
    async function sendCorrection() {
        const reason = document.getElementById('reason').value; if (!reason) return alert("Reason required.");
        try {
            const res = await fetch('https://attendance-afrotcdet320.pythonanywhere.com/api/student/submit_correction', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: activeCadet.name, student_id: activeCadet.id, date: activeDate, reason: reason }) });
            if (res.ok) { alert("Report Sent."); closeModal(); } else { alert("Failed."); }
        } catch (e) { alert("Network Error."); }
    }
</script>
</body>
</html>
